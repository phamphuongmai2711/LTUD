<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NÓTE{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: #fdfbf7; color: #2c2523; }

        /* HEADER */
        header { background-color: #ffffff; position: sticky; top: 0; width: 100%; z-index: 1000; box-shadow: 0 4px 25px rgba(44,37,35,0.03); border-bottom: 1px solid #f3ece4; }
        .main-nav-container { max-width: 1200px; margin: 0 auto; padding: 22px 20px; display: flex; flex-direction: column; align-items: center; }
        .brand-logo { font-family: 'Playfair Display', serif; font-size: 34px; font-weight: 700; letter-spacing: 10px; color: #1a1514; margin-bottom: 18px; cursor: pointer; text-decoration: none; }
        .menu-links { display: flex; gap: 30px; }
        .menu-links a { text-decoration: none; color: #4a3f3d; font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 600; letter-spacing: 1px; padding: 5px 0; position: relative; transition: color 0.3s; }
        .menu-links a:hover { color: #cc7a6f; }
        .menu-links a::after { content: ''; position: absolute; bottom: 0; left: 50%; width: 0; height: 1px; background-color: #cc7a6f; transition: all 0.35s ease; transform: translateX(-50%); }
        .menu-links a:hover::after { width: 100%; }

        .content-wrapper { margin-top: 180px; }

        /* FOOTER */
        footer { background-color: #1a1514; color: #f3ece4; text-align: center; padding: 40px 20px; margin-top: 80px; font-size: 13px; letter-spacing: 1px; }
        .visitor-count { font-family: 'Playfair Display', serif; font-size: 28px; color: #cc7a6f; margin-bottom: 8px; }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>

<header>
    <div class="main-nav-container">
        <a class="brand-logo" href="{% url 'home' %}">N Ó T E</a>
        <nav class="menu-links">
            <a href="{% url 'home' %}">Trang chủ</a>
            <a href="{% url 'product_list' %}">Sản phẩm</a>
            <a href="{% url 'about' %}">Giới thiệu</a>
            <a href="{% url 'news' %}">Tin tức</a>
            <a href="{% url 'contact' %}">Liên hệ</a>
        </nav>
    </div>
</header>

<div class="content-wrapper">
    {% block content %}{% endblock %}
</div>

<footer>
    {% block footer_extra %}{% endblock %}
    <p>© 2026 NÓTE — Đồ dùng học tập</p>
</footer>
{% block extra_js %}{% endblock %}
</body>
</html>
